# thinkdome Egress Proxy — Squid Configuration
# Only allows LLM-related API domains through the sandbox network.
# Used when Admin tokens request network access via ISOLATED profile.

# Listening port
http_port 3128

# Access control — domain whitelist
acl allowed_domains dstdomain .anthropic.com
acl allowed_domains dstdomain .openai.com
acl allowed_domains dstdomain .googleapis.com
acl allowed_domains dstdomain .huggingface.co
acl allowed_domains dstdomain .pypi.org
acl allowed_domains dstdomain .pythonhosted.org
acl allowed_domains dstdomain .duckduckgo.com

# Allow CONNECT method for HTTPS tunneling to whitelisted domains
acl SSL_ports port 443
acl CONNECT method CONNECT

http_access allow CONNECT SSL_ports allowed_domains
http_access allow allowed_domains

# Deny everything else
http_access deny all

# Logging
access_log /var/log/squid/access.log squid
cache_log /var/log/squid/cache.log

# Performance
cache deny all
dns_nameservers 8.8.8.8 8.8.4.4

# Connection limits
maximum_object_size 10 MB
client_lifetime 120 seconds
connect_timeout 15 seconds
read_timeout 30 seconds

# Security headers
request_header_access X-Forwarded-For deny all
request_header_access Via deny all
reply_header_access X-Squid-Error deny all

# PID file
pid_filename /var/run/squid/squid.pid
